name: Python Tests
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest
    
    # Define a matrix to test across multiple Python versions
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        # You can add more versions or specific OS runners here if needed

    steps:
      - name: 🔍 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: ⚡ Install uv
        # Install uv using the recommended installation method
        run: pip install uv
        
      - name: 📦 Install dependencies with uv
        # Use uv sync with the required test extras
        run: uv sync --extra test
        
      - name: 🧪 Run tests with uv run pytest
        # Use uv run to execute pytest in the isolated environment
        run: uv run pytest
