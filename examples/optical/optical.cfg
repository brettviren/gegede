# GeGeDe configuration for the optical prism example.
#
# Run with:
#   gegede -o optical_prism.gdml optical.cfg
#
# The [OpticalPrism] section is the first (and only) top-level builder, so
# the gegede CLI will pick it as the world builder automatically.
#
# All Q("…") values are parsed by pint and must carry units where the
# schema requires them.  Omitted parameters fall back to the builder's
# defaults (see optical.py::OpticalPrismBuilder.defaults).

[OpticalPrism]
class = optical.OpticalPrismBuilder

# Half-length of the cubic stainless-steel world volume (full side = 1 m).
steel_dx = Q("50cm")

# Half-length of the cubic air daughter volume (full side = 90 cm).
air_dx = Q("45cm")

# Half-depth of the glass prism along its extrusion axis (full depth = 20 cm).
prism_dz = Q("10cm")
